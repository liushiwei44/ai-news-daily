name: 企微群通知

on:
  push:
    branches: [main]
    paths:
      - 'ai-news-*.html'
  workflow_dispatch:  # 手动触发，用于测试

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检测目标快讯文件
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET=$(ls ai-news-*.html 2>/dev/null | sort | tail -1)
          else
            TARGET=$(git diff --name-status HEAD~1 HEAD -- 'ai-news-*.html' \
                    | awk '$1=="A"{print $2}' | sort | tail -1)
          fi
          if [ -z "$TARGET" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "file=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: 提取内容并发送企微通知
        if: steps.detect.outputs.skip != 'true'
        env:
          WECHAT_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
          SITE_BASE: https://liushiwei44.github.io/ai-news-daily
        run: |
          TARGET="${{ steps.detect.outputs.file }}"
          URL="${SITE_BASE}/${TARGET}"

          # 期号：当前仓库内 ai-news-*.html 总数
          ISSUE_NUM=$(printf '%02d' "$(ls ai-news-*.html 2>/dev/null | wc -l)")

          # 日期时间（从文件名解析）
          CODE="${TARGET%.html}"; CODE="${CODE#ai-news-}"
          DATE_RAW="${CODE%-*}"; TIME_RAW="${CODE##*-}"
          DATETIME="${DATE_RAW:0:4}-${DATE_RAW:4:2}-${DATE_RAW:6:2} ${TIME_RAW:0:2}:${TIME_RAW:2:2}"

          # 用 Python 生成完整的企微 Markdown 消息文本
          CONTENT=$(python3 - "$TARGET" "$ISSUE_NUM" "$DATETIME" "$URL" <<'PYEOF'
import sys, re, html as h

src        = open(sys.argv[1]).read()
issue_num  = sys.argv[2]
datetime_  = sys.argv[3]
url        = sys.argv[4]

def clean(s):
    s = h.unescape(s)
    return re.sub(r'\s+', ' ', s).strip()

def shorten(s, n):
    s = clean(s)
    return s[:n] + ('…' if len(s) > n else '')

def first_clause(s):
    s = clean(s)
    for sep in ['。', '；']:
        idx = s.find(sep)
        if 0 < idx <= 52:
            return s[:idx + 1]
    return shorten(s, 52)

titles    = re.findall(r'<div class="card-title">(.*?)</div>', src)
summaries = re.findall(r'<p class="card-summary">(.*?)</p>', src, re.DOTALL)

lines = [
    f'## 📡 AI 行业快讯 · No.{issue_num}',
    f'<font color="comment">{datetime_} BJT · 软件开发 / 模型前沿 / 中国动态</font>',
    '',
]

for i, (t, s) in enumerate(zip(titles[:10], summaries[:10]), 1):
    lines.append(f'<font color="info">**{i:02d}** {shorten(t, 36)}</font>')
    lines.append(f'<font color="comment">　▸ {first_clause(s)}</font>')
    lines.append('')

lines.append(f'**[→ 查看完整 Top 10 精选 ↗]({url})**')

print('\n'.join(lines))
PYEOF
)

          echo "===== 消息预览 ====="
          echo "$CONTENT"
          echo "===================="

          # 构造 JSON body（jq 保证转义正确）
          BODY=$(jq -n --arg c "$CONTENT" '{msgtype:"markdown",markdown:{content:$c}}')

          HTTP=$(curl -sf -o /tmp/wx_resp.json -w "%{http_code}" \
            -X POST \
            "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WECHAT_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "HTTP status: $HTTP"
          cat /tmp/wx_resp.json

          ERRCODE=$(jq -r '.errcode' /tmp/wx_resp.json)
          if [ "$ERRCODE" != "0" ]; then
            echo "WeChat API error: $(jq -r '.errmsg' /tmp/wx_resp.json)"
            exit 1
          fi
